<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="../css/store.css">
    <script src="../scripts/common.js"></script>
    <script src="../scripts/shipping.js"></script>
</head>
<body onload="initShippingPage()">
<div class="container">
	<div class="header">
	<header>Stuff For Your Self</header>
	</div>
	<div class="nav">
	<nav> 
		<a href="../index.html">Home</a><br>
		<a href="store.html">Products</a><br>
        <a href="store.html">Today's Deals</a><br>
		<a href="cart.html">Cart</a><br>
		<a href="../contact.html">About Us</a><br>
	</nav>
	</div>
	<div class="paragraph">
	<main>
        <section class="shipping-card">
            <h2>Shipping Information</h2>
            <form id="shipping-form">
                <label for="fullName">Full Name:</label><br>
                <input type="text" id="fullName" required><br>

                <label for="address">Street Address:</label><br>
                <input type="text" id="address" required><br>

                <label for="city">City:</label><br>
                <input type="text" id="city" required><br>

                <label for="state">State:</label><br>
                <input type="text" id="state" required><br>

                <label for="zipCode">Zip Code:</label><br>
                <input type="text" id="zipCode" required><br>

                <label for="notes">Delivery Notes:</label><br>
                <textarea id="notes" rows="4"></textarea><br>

                <button type="submit" class="action-button primary-button">Place Simulated Order</button>
            </form>

            <div id="shipping-message"></div>
        </section>
        <section class="summary-card">
            <h2>Order Summary</h2>
            <div id="shipping-summary"></div>
        </section>
	</main>
	</div>
	<div class="aside"></div>
